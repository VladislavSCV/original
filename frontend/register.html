<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Банкетам.Нет — Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="brand-header"><h1>Банкетам.Нет</h1><p>Регистрация</p></header>
    <div class="card-panel">
      <form id="register-form">
        <div class="mb-2"><label class="form-label">ФИО</label><input class="form-control" name="full_name" required /><div id="full_name-hint" class="form-hint"></div></div>
        <div class="mb-2"><label class="form-label">Телефон</label><input class="form-control" name="phone" required /><div id="phone-hint" class="form-hint"></div></div>
        <div class="mb-2"><label class="form-label">E-mail</label><input class="form-control" name="email" type="email" required /><div id="email-hint" class="form-hint"></div></div>
        <div class="mb-2"><label class="form-label">Логин</label><input class="form-control" name="login" required /><div id="login-hint" class="form-hint"></div></div>
        <div class="mb-3"><label class="form-label">Пароль</label><input class="form-control" name="password" type="password" required /><div id="password-hint" class="form-hint"></div></div>
        <button type="submit" class="btn btn-brand">Зарегистрироваться</button>
      </form>
      <a class="nav-link-soft" href="/index.html">Уже есть аккаунт? Войти</a>
    </div>
  </div>
  <script type="module" src="/src/pages/register.js"></script>
</body>
</html>
