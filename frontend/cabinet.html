<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Банкетам.Нет — Кабинет</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="brand-header d-flex justify-content-between">
      <div><h1>Личный кабинет</h1><p id="user-greeting"></p></div>
      <button id="logout-btn" class="btn btn-sm btn-outline-secondary">Выйти</button>
    </header>
    <div id="hero-slider" class="hero-slider">
      <div class="slide active"><img src="/slider/3.jpg" alt="" /></div>
      <div class="slide"><img src="/slider/1.jpg" alt="" /></div>
      <div class="slide"><img src="/slider/2.jpg" alt="" /></div>
      <div class="slider-controls">
        <button type="button" data-slider-prev>‹</button>
        <button type="button" data-slider-next>›</button>
      </div>
    </div>
    <section class="card-panel">
      <h2 class="h6">Заявка — история</h2>
      <div id="records-list"></div>
      <a class="btn btn-brand btn-sm mt-2" href="/create.html">Создать</a>
    </section>
  </div>
  <div class="modal fade" id="reviewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Отзыв</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <form id="review-form">
            <input type="hidden" name="record_id" />
            <div class="mb-2"><label class="form-label">Оценка</label><select class="form-select" name="rating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div>
            <div class="mb-2"><label class="form-label">Текст</label><textarea class="form-control" name="text" rows="3" required></textarea></div>
            <div id="review-hint" class="form-hint"></div>
            <button class="btn btn-brand">Отправить</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/src/pages/cabinet.js"></script>
</body>
</html>
