<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Банкетам.Нет — Заявка</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="brand-header"><h1>Заявка</h1><p>Бронирование помещений для проведения банкетов</p></header>
    <div class="card-panel">
      <div id="form-alert" class="alert alert-inline d-none"></div>
      <form id="record-form">
        <div class="mb-3">
          <label class="form-label">Тип помещения</label>
          <select class="form-select" name="room_type" required>
            <option value="">Выберите...</option>
            <option value="зал">Зал</option>
            <option value="ресторан">Ресторан</option>
            <option value="лентняя веранда">Летняя веранда</option>
            <option value="закрытая веранда">Закрытая веранда</option>
          </select>
          <div id="room_type-hint" class="form-hint"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Дата начала банкета</label>
          <input class="form-control" name="start_date" placeholder="ДД.ММ.ГГГГ" pattern="\d{2}\.\d{2}\.\d{4}" required />
          <div id="start_date-hint" class="form-hint"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Способ оплаты</label>
          <select class="form-select" name="payment_method" required>
            <option value="">Выберите...</option>
            <option value="предоплата по QR-коду">Предоплата по QR-коду</option>
            <option value="оплата картой МИР">Оплата картой МИР</option>
            <option value="постоплата в офисе организации">Постоплата в офисе организации</option>
          </select>
          <div id="payment_method-hint" class="form-hint"></div>
        </div>
        <button type="submit" class="btn btn-brand">Отправить</button>
      </form>
      <a class="nav-link-soft" href="/cabinet.html">Личный кабинет</a>
    </div>
  </div>
  <script type="module" src="/src/pages/create.js"></script>
</body>
</html>
