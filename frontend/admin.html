<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Банкетам.Нет — Админ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="brand-header d-flex justify-content-between">
      <div><h1>Администратор</h1><p>Заявка</p></div>
      <button id="logout-btn" class="btn btn-sm btn-outline-secondary">Выйти</button>
    </header>
    <div class="card-panel">
      <div class="row g-2 mb-2">
        <div class="col-6"><label class="form-label small">Статус</label>
          <select id="filter-status" class="form-select form-select-sm">
            <option value="all">Все</option>
            <option value="Новая">Новая</option>
            <option value="Банкет назначен">Банкет назначен</option>
            <option value="Банкет завершен">Банкет завершен</option>
          </select>
        </div>
        <div class="col-6"><label class="form-label small">Сортировка</label>
          <select id="sort-field" class="form-select form-select-sm">
            <option value="id">ID</option>
            <option value="status">Статус</option>
            <option value="room_type">Тип помещения</option>
            <option value="start_date">Дата начала банкета</option>
            <option value="payment_method">Способ оплаты</option>
          </select>
        </div>
      </div>
      <div class="form-check form-switch mb-2">
        <input class="form-check-input" type="checkbox" id="sort-desc" checked />
        <label class="form-check-label small" for="sort-desc">По убыванию</label>
      </div>
      <div id="admin-table"></div>
      <ul id="pagination" class="pagination pagination-sm justify-content-center mt-2"></ul>
    </div>
  </div>
  <div class="toast-container"><div id="status-toast" class="toast text-bg-success"><div class="toast-body">Статус изменён</div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/src/pages/admin.js"></script>
</body>
</html>
