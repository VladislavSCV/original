<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Банкетам.Нет — Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body data-after-login="/create.html">
  <div class="app-shell">
    <header class="brand-header"><h1>Банкетам.Нет</h1><p>Бронирование помещений для проведения банкетов</p></header>
    <div class="card-panel">
      <div id="login-alert" class="alert alert-warning alert-inline d-none"></div>
      <form id="login-form">
        <div class="mb-3"><label class="form-label">Логин</label><input class="form-control" name="login" required /><div id="login-hint" class="form-hint"></div></div>
        <div class="mb-3"><label class="form-label">Пароль</label><input class="form-control" name="password" type="password" required /><div id="password-hint" class="form-hint"></div></div>
        <button type="submit" class="btn btn-brand">Войти</button>
      </form>
      <a class="nav-link-soft" href="/register.html">Ещё не зарегистрированы? Регистрация</a>
    </div>
  </div>
  <script type="module" src="/src/pages/login.js"></script>
</body>
</html>
